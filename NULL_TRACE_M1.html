<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NULL//TRACE — OS v0.1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg:        #0d1117;
    --bg2:       #161b22;
    --bg3:       #1c2333;
    --bg4:       #21262d;
    --border:    #30363d;
    --border2:   #3d444d;
    --cyan:      #00b4d8;
    --cyan-dim:  #0077a8;
    --cyan-glow: rgba(0,180,216,0.15);
    --text:      #e6edf3;
    --text2:     #8b949e;
    --text3:     #484f58;
    --green:     #3fb950;
    --green-dim: #238636;
    --red:       #f85149;
    --red-dim:   #da3633;
    --amber:     #d29922;
    --amber-dim: #9e6a03;
    --purple:    #a371f7;
    --mono:      'JetBrains Mono', 'Share Tech Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    width: 100vw; height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ── SCANLINE OVERLAY ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ════════════════════════════════════
     BOOT SCREEN
  ════════════════════════════════════ */
  #boot {
    position: fixed; inset: 0;
    background: #000;
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
    padding: 60px;
    z-index: 1000;
    font-size: 13px;
  }

  .boot-line {
    color: var(--text2);
    line-height: 1.6;
    opacity: 0;
    white-space: pre;
  }
  .boot-line.ok    { color: var(--green); }
  .boot-line.warn  { color: var(--amber); }
  .boot-line.error { color: var(--red); }
  .boot-line.cyan  { color: var(--cyan); }
  .boot-line.dim   { color: var(--text3); }
  .boot-line.show  { opacity: 1; }

  #boot-bar-wrap {
    margin-top: 32px;
    width: 400px;
    display: none;
  }
  #boot-bar-label { color: var(--text2); font-size: 12px; margin-bottom: 6px; }
  #boot-bar-track {
    width: 100%; height: 2px;
    background: var(--bg3);
  }
  #boot-bar-fill {
    height: 100%; width: 0%;
    background: var(--cyan);
    transition: width 0.05s linear;
  }

  /* ════════════════════════════════════
     LOGIN SCREEN
  ════════════════════════════════════ */
  #login {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 900;
  }

  .login-logo {
    font-size: 42px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 6px;
    margin-bottom: 6px;
  }
  .login-version {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 4px;
    margin-bottom: 48px;
  }

  .login-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 32px 40px;
    width: 380px;
  }

  .login-field {
    margin-bottom: 16px;
  }
  .login-label {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 2px;
    margin-bottom: 6px;
    display: block;
  }
  .login-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .login-input:focus {
    border-color: var(--cyan-dim);
  }

  .login-btn {
    width: 100%;
    background: var(--cyan-dim);
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 12px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
  }
  .login-btn:hover { background: var(--cyan); }

  .login-error {
    font-size: 11px;
    color: var(--red);
    margin-top: 12px;
    min-height: 16px;
  }

  .login-hint {
    font-size: 10px;
    color: var(--text3);
    margin-top: 24px;
    text-align: center;
    letter-spacing: 1px;
  }

  /* ════════════════════════════════════
     DESKTOP
  ════════════════════════════════════ */
  #desktop {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
  }

  /* ── TASKBAR ── */
  #taskbar {
    height: 32px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    flex-shrink: 0;
    z-index: 100;
  }

  #taskbar-left {
    display: flex; align-items: center; gap: 16px;
  }

  .tb-logo {
    font-size: 12px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 2px;
  }

  .tb-apps {
    display: flex; gap: 4px;
  }

  .tb-app-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text2);
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.1s;
  }
  .tb-app-btn:hover {
    color: var(--cyan);
    border-color: var(--border);
    background: var(--bg3);
  }
  .tb-app-btn.active {
    color: var(--cyan);
    border-color: var(--cyan-dim);
    background: var(--cyan-glow);
  }

  #taskbar-right {
    display: flex; align-items: center; gap: 16px;
  }

  .tb-stat {
    font-size: 10px;
    color: var(--text3);
  }
  .tb-stat span { color: var(--text2); }
  .tb-stat.warn span { color: var(--amber); }
  .tb-stat.danger span { color: var(--red); }

  #tb-clock {
    font-size: 11px;
    color: var(--text2);
    font-weight: 500;
  }

  /* ── WORKSPACE ── */
  #workspace {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* ── DESKTOP ICONS ── */
  #desktop-icons {
    position: absolute;
    top: 16px; left: 16px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 1;
  }

  .desk-icon {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    padding: 8px;
    width: 72px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.1s;
  }
  .desk-icon:hover {
    background: var(--cyan-glow);
    border-color: var(--cyan-dim);
  }
  .desk-icon-glyph {
    font-size: 20px;
    color: var(--cyan);
  }
  .desk-icon-label {
    font-size: 9px;
    color: var(--text2);
    letter-spacing: 1px;
    text-align: center;
  }

  /* ── WINDOWS ── */
  .window {
    position: absolute;
    background: var(--bg2);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-width: 300px;
    min-height: 200px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .window.focused {
    border-color: var(--border2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,180,216,0.1);
  }

  .win-titlebar {
    height: 30px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 10px;
    cursor: move;
    flex-shrink: 0;
    gap: 8px;
  }
  .win-controls {
    display: flex; gap: 5px;
  }
  .win-btn {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    transition: opacity 0.1s;
  }
  .win-btn.close  { background: var(--red-dim); }
  .win-btn.min    { background: var(--amber-dim); }
  .win-btn.max    { background: var(--green-dim); }
  .win-btn:hover  { opacity: 0.8; }

  .win-title {
    flex: 1;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text2);
    text-align: center;
  }
  .win-title-spacer { width: 30px; }

  .win-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── RESIZE HANDLE ── */
  .resize-handle {
    position: absolute;
    bottom: 0; right: 0;
    width: 14px; height: 14px;
    cursor: se-resize;
  }
  .resize-handle::after {
    content: '';
    position: absolute;
    bottom: 3px; right: 3px;
    width: 6px; height: 6px;
    border-right: 2px solid var(--border2);
    border-bottom: 2px solid var(--border2);
  }

  /* ════════════════════════════════════
     TERMINAL APP
  ════════════════════════════════════ */
  #term-output {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    font-size: 12px;
    line-height: 1.7;
    scroll-behavior: smooth;
  }
  #term-output::-webkit-scrollbar { width: 4px; }
  #term-output::-webkit-scrollbar-track { background: transparent; }
  #term-output::-webkit-scrollbar-thumb { background: var(--border2); }

  .term-line { white-space: pre-wrap; word-break: break-all; }
  .term-line.cmd   { color: var(--cyan); }
  .term-line.out   { color: var(--text2); }
  .term-line.ok    { color: var(--green); }
  .term-line.err   { color: var(--red); }
  .term-line.warn  { color: var(--amber); }
  .term-line.info  { color: var(--purple); }
  .term-line.data  { color: var(--text); }
  .term-line.dim   { color: var(--text3); }
  .term-line.cyan  { color: var(--cyan); }
  .term-line.blank { height: 8px; }

  .term-prompt-row {
    display: flex;
    align-items: center;
    padding: 4px 14px 8px;
    gap: 0;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }

  .term-prompt-label {
    font-size: 12px;
    color: var(--cyan);
    white-space: nowrap;
    flex-shrink: 0;
  }

  #term-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    caret-color: var(--cyan);
  }

  /* ════════════════════════════════════
     MAIL APP
  ════════════════════════════════════ */
  .mail-layout {
    display: flex;
    height: 100%;
  }
  .mail-list {
    width: 220px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .mail-list::-webkit-scrollbar { width: 3px; }
  .mail-list::-webkit-scrollbar-thumb { background: var(--border2); }

  .mail-list-header {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text3);
    padding: 10px 12px 6px;
    border-bottom: 1px solid var(--border);
  }

  .mail-item {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .mail-item:hover { background: var(--bg3); }
  .mail-item.selected { background: var(--cyan-glow); border-left: 2px solid var(--cyan); }
  .mail-item.unread .mail-from { color: var(--text); font-weight: 700; }

  .mail-from { font-size: 11px; color: var(--text2); margin-bottom: 2px; }
  .mail-subj { font-size: 10px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mail-time { font-size: 9px; color: var(--text3); float: right; }

  .mail-view {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    font-size: 12px;
  }
  .mail-view::-webkit-scrollbar { width: 3px; }
  .mail-view::-webkit-scrollbar-thumb { background: var(--border2); }

  .mail-view-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
    margin-bottom: 12px;
  }
  .mail-view-subj { font-size: 14px; color: var(--text); margin-bottom: 8px; font-weight: 500; }
  .mail-meta { font-size: 10px; color: var(--text3); line-height: 1.8; }
  .mail-meta span { color: var(--text2); }
  .mail-body { color: var(--text2); line-height: 1.8; font-size: 11px; white-space: pre-wrap; }

  .mail-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--text3); letter-spacing: 2px;
  }

  /* ════════════════════════════════════
     SYSMON APP
  ════════════════════════════════════ */
  .sysmon-body {
    padding: 12px;
    font-size: 11px;
    overflow-y: auto;
    gap: 12px;
    display: flex;
    flex-direction: column;
  }
  .sysmon-section-title {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .sysmon-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .sysmon-key { color: var(--text3); }
  .sysmon-val { color: var(--text2); }
  .sysmon-val.ok     { color: var(--green); }
  .sysmon-val.warn   { color: var(--amber); }
  .sysmon-val.danger { color: var(--red); }

  .bar-track {
    height: 4px;
    background: var(--bg4);
    margin-top: 4px;
    margin-bottom: 10px;
  }
  .bar-fill {
    height: 100%;
    background: var(--cyan);
    transition: width 0.5s;
  }
  .bar-fill.ok     { background: var(--green); }
  .bar-fill.warn   { background: var(--amber); }
  .bar-fill.danger { background: var(--red); }

  .sysmon-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 0;
  }

  /* ════════════════════════════════════
     TRACE INDICATOR (always visible in desktop)
  ════════════════════════════════════ */
  #trace-indicator {
    position: fixed;
    bottom: 16px; right: 16px;
    width: 200px;
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 10px 12px;
    z-index: 500;
    display: none;
    pointer-events: none;
  }

  .trace-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text3);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  #trace-pct { color: var(--red); }

  .trace-track {
    height: 3px;
    background: var(--bg4);
  }
  #trace-fill {
    height: 100%;
    width: 0%;
    background: var(--green);
    transition: width 0.3s, background 0.3s;
  }

  /* ════════════════════════════════════
     MISC
  ════════════════════════════════════ */
  #status-bar {
    height: 22px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 16px;
    flex-shrink: 0;
  }
  .sb-item {
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--text3);
  }
  .sb-item span { color: var(--text2); }
  .sb-item.ok span { color: var(--green); }
  .sb-item.warn span { color: var(--amber); }

  .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .fade-in { animation: fadeIn 0.3s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>

const winDefaults = {

};

function openApp(id) {
  if (windows[id]) {
    focusWindow(id);
    return;
  }
  const def = winDefaults[id];
  const win = document.createElement('div');
  win.className = 'window';
  win.id = `win-${id}`;
  win.style.width = def.w + 'px';
  win.style.height = def.h + 'px';
  win.style.left = def.x + 'px';
  win.style.top = def.y + 'px';
  win.style.zIndex = ++zCounter;
  win.classList.add('fade-in');

  win.innerHTML = `
    <div class="win-titlebar" id="titlebar-${id}">
      <div class="win-controls">
        <button class="win-btn close" onclick="closeApp('${id}')"></button>
        <button class="win-btn min" onclick="minimizeApp('${id}')"></button>
        <button class="win-btn max" onclick="maximizeApp('${id}')"></button>
      </div>
      <div class="win-title">${def.title}</div>
      <div class="win-title-spacer"></div>
    </div>
    <div class="win-body" id="body-${id}"></div>
    <div class="resize-handle" id="resize-${id}"></div>
  `;

  document.getElementById('workspace').appendChild(win);
  windows[id] = { el: win, minimized: false, maximized: false, origStyle: null };

  makeDraggable(win, document.getElementById(`titlebar-${id}`));
  makeResizable(win, document.getElementById(`resize-${id}`));
  win.addEventListener('mousedown', () => focusWindow(id));

  buildAppContent(id);
  focusWindow(id);
  updateTaskbar(id, true);
}

function focusWindow(id) {
  if (focusedWin && windows[focusedWin]) {
    windows[focusedWin].el.classList.remove('focused');
  }
  focusedWin = id;
  if (windows[id]) {
    const w = windows[id];
    w.el.classList.add('focused');
    w.el.style.zIndex = ++zCounter;
    if (id === 'terminal') {
      setTimeout(() => document.getElementById('term-input')?.focus(), 50);
    }
  }
}

function closeApp(id) {
  if (!windows[id]) return;
  windows[id].el.remove();
  delete windows[id];
  updateTaskbar(id, false);
  if (focusedWin === id) focusedWin = null;
}

function minimizeApp(id) {
  if (!windows[id]) return;
  const w = windows[id];
  w.minimized = !w.minimized;
  w.el.style.display = w.minimized ? 'none' : 'flex';
}

function maximizeApp(id) {
  if (!windows[id]) return;
  const w = windows[id];
  const ws = document.getElementById('workspace');
  if (!w.maximized) {
    w.origStyle = { left: w.el.style.left, top: w.el.style.top, width: w.el.style.width, height: w.el.style.height };
    w.el.style.left = '0'; w.el.style.top = '0';
    w.el.style.width = ws.clientWidth + 'px';
    w.el.style.height = ws.clientHeight + 'px';
    w.maximized = true;
  } else {
    Object.assign(w.el.style, w.origStyle);
    w.maximized = false;
  }
}

function updateTaskbar(id, open) {
  document.querySelectorAll('.tb-app-btn').forEach(btn => {
    const appId = btn.getAttribute('onclick')?.match(/'(\w+)'/)?.[1];
    if (appId && windows[appId]) btn.classList.add('active');
    else btn.classList.remove('active');
  });
}

// DRAG & RESIZE

function makeDraggable(win, handle) {
  let ox, oy, startL, startT;
  handle.addEventListener('mousedown', e => {
    if (e.target.classList.contains('win-btn')) return;
    ox = e.clientX; oy = e.clientY;
    startL = parseInt(win.style.left) || 0;
    startT = parseInt(win.style.top) || 0;
    const move = ev => {
      win.style.left = Math.max(0, startL + ev.clientX - ox) + 'px';
      win.style.top  = Math.max(0, startT + ev.clientY - oy) + 'px';
    };
    const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
    e.preventDefault();
  });
}

function makeResizable(win, handle) {
  handle.addEventListener('mousedown', e => {
    const startW = parseInt(win.style.width), startH = parseInt(win.style.height);
    const sx = e.clientX, sy = e.clientY;
    const move = ev => {
      win.style.width  = Math.max(300, startW + ev.clientX - sx) + 'px';
      win.style.height = Math.max(200, startH + ev.clientY - sy) + 'px';
    };
    const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
    e.preventDefault();
  });
}

function getPrompt() {
  const host = connectedHost ? `@${connectedHost}` : '';
  const path = cwd.replace(`/home/${currentUser}`, '~');
  return `${currentUser}${host}:${path}$ `;

function handleTermKey(e) {
  if (e.key === 'Enter') {
    const cmd = e.target.value.trim();
    e.target.value = '';
    if (cmd) { termHistory.unshift(cmd); histIdx = -1; }
    printLine(`${getPrompt()}${cmd}`, 'cmd');
    if (cmd) runCommand(cmd);
    scrollTerminal();
  } else if (e.key === 'ArrowUp') {
    histIdx = Math.min(histIdx + 1, termHistory.length - 1);
    e.target.value = termHistory[histIdx] || '';
    e.preventDefault();
  } else if (e.key === 'ArrowDown') {
    histIdx = Math.max(histIdx - 1, -1);
    e.target.value = histIdx >= 0 ? termHistory[histIdx] : '';
    e.preventDefault();
  }
}

function printLine(text, cls = 'out') {
  const out = document.getElementById('term-output');
  if (!out) return;
  const el = document.createElement('div');
  el.className = `term-line ${cls}`;
  el.textContent = text;
  out.appendChild(el);
}

function runCommand(raw) {
  const parts = raw.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);

  const cmds = {
    help, clear, pwd, ls, cd, cat, mkdir, touch, rm,
    whoami, ifconfig, status, scan, connect, disconnect,
    echo: () => printLine(args.join(' ')),
    date: () => printLine(new Date().toISOString()),
    uname: () => printLine('phantom-3.7 NULL//TRACE-OS x86_64'),
    history: () => termHistory.forEach((h, i) => printLine(`  ${i + 1}  ${h}`, 'dim')),
    man: () => printLine('Manual pages not installed. Use \'help\'.', 'warn'),
    sudo: () => printLine('Permission denied. Operator already has full access.', 'err'),
    exit: () => printLine('Cannot exit — operator session is persistent.', 'warn'),
    reboot: () => printLine('Reboot disabled in stealth mode.', 'warn'),
  };

  if (cmds[cmd]) {
    cmds[cmd](args);
  } else {
    printLine(`command not found: ${cmd}`, 'err');
    printLine(`Type 'help' for available commands`, 'dim');
  }

  updatePromptLabel();
  scrollTerminal();
}

function ls(args) {
  const target = args[0] ? resolvePath(args[0]) : cwd;
  const entries = Object.keys(FS).filter(p => {
    const parent = p.substring(0, p.lastIndexOf('/')) || '/';
    return parent === target && p !== target;
  });

  if (!FS[target]) { printLine(`ls: ${target}: No such directory`, 'err'); return; }
  if (FS[target].type !== 'dir') { printLine(`ls: ${target}: Not a directory`, 'err'); return; }

  if (entries.length === 0) { printLine('  (empty)', 'dim'); return; }

  printLine('', 'blank');
  entries.forEach(p => {
    const name = p.split('/').pop();
    const node = FS[p];
    if (node.type === 'dir') {
      printLine(`  ${name}/`, 'cyan');
    } else {
      const hidden = name.startsWith('.') ? '  ' : '';
      printLine(`  ${name}`, name.startsWith('.') ? 'dim' : 'out');
    }
  });
  printLine('', 'blank');
}

function cd(args) {
  if (!args[0] || args[0] === '~') {
    cwd = `/home/${currentUser}`;
    return;
  }
  const target = resolvePath(args[0]);
  if (!FS[target]) { printLine(`cd: ${args[0]}: No such directory`, 'err'); return; }
  if (FS[target].type !== 'dir') { printLine(`cd: ${args[0]}: Not a directory`, 'err'); return; }
  cwd = target;
}

function cat(args) {
  if (!args[0]) { printLine('cat: missing operand', 'err'); return; }
  const target = resolvePath(args[0]);
  if (!FS[target]) { printLine(`cat: ${args[0]}: No such file`, 'err'); return; }
  if (FS[target].type === 'dir') { printLine(`cat: ${args[0]}: Is a directory`, 'err'); return; }
  printLine('', 'blank');
  FS[target].content.split('\n').forEach(line => printLine(line || ' ', 'data'));
  printLine('', 'blank');
}

function mkdir(args) {
  if (!args[0]) { printLine('mkdir: missing operand', 'err'); return; }
  const target = resolvePath(args[0]);
  if (FS[target]) { printLine(`mkdir: ${args[0]}: Already exists`, 'err'); return; }
  FS[target] = { type: 'dir' };
  printLine(`Directory created: ${args[0]}`, 'ok');
}

function touch(args) {
  if (!args[0]) { printLine('touch: missing operand', 'err'); return; }
  const target = resolvePath(args[0]);
  if (!FS[target]) FS[target] = { type: 'file', content: '' };
  printLine(`File updated: ${args[0]}`, 'ok');
}

function rm(args) {
  if (!args[0]) { printLine('rm: missing operand', 'err'); return; }
  const target = resolvePath(args[0]);
  if (!FS[target]) { printLine(`rm: ${args[0]}: No such file`, 'err'); return; }
  if (FS[target].type === 'dir') {
    const children = Object.keys(FS).filter(p => p.startsWith(target + '/'));
    if (children.length > 0) { printLine(`rm: ${args[0]}: Directory not empty`, 'err'); return; }
  }
  delete FS[target];
  printLine(`Removed: ${args[0]}`, 'ok');
}

let remoteFS = null;

function connect(args) {
  const host = args[0];
  if (!host) { printLine('Usage: connect [host/ip]', 'err'); return; }
  if (connectedHost) { printLine(`Already connected to ${connectedHost}. Run 'disconnect' first.`, 'warn'); return; }

  printLine(``, 'blank');
  printLine(`[*] Initiating connection to ${host}...`, 'info');
  printLine(`[*] Attempting anonymous access...`, 'dim');

  setTimeout(() => {

    if (!target) {

      printLine(`[*] Tip: Run 'scan ${host}' first to identify attack surface`, 'dim');
      printLine(``, 'blank');
      return;
    }

    connectedHost = host;
    remoteFS = target.fs;
    cwd = '/';
    updatePromptLabel();

    printLine(``, 'blank');
    printLine(`[+] Connected to ${host} as ${target.user}`, 'ok');

function disconnect() {
  if (!connectedHost) { printLine('Not connected to any host.', 'warn'); return; }
  const old = connectedHost;
  connectedHost = null;
  remoteFS = null;
  cwd = `/home/${currentUser}`;
  updatePromptLabel();

  stopTrace();
  document.getElementById('tb-conn').querySelector('span').textContent = 'OFFLINE';
  document.getElementById('tb-conn').classList.remove('warn');
  document.getElementById('sb-target').querySelector('span').textContent = '—';

  printLine(``, 'blank');
  printLine(`[+] Disconnected from ${old}`, 'ok');
  printLine(`[*] Session terminated. Cover your tracks — delete logs if accessed.`, 'dim');
  printLine(``, 'blank');
}

function resolvePath(p) {
  if (p === '..') {
    const parts = cwd.split('/').filter(Boolean);
    parts.pop();
    return '/' + parts.join('/') || '/';
  }
  if (p.startsWith('/')) return p.replace(/\/+$/, '') || '/';
  const base = cwd === '/' ? '' : cwd;
  return `${base}/${p}`.replace(/\/+/g, '/');
}

// Override ls/cd/cat when connected to use remote FS
const _ls = ls, _cd = cd, _cat = cat;
function ls(args) {
  const fs = connectedHost ? remoteFS : FS;
  const target = args[0] ? resolvePath(args[0]) : cwd;
  const entries = Object.keys(fs).filter(p => {
    const parent = p.substring(0, p.lastIndexOf('/')) || '/';
    return parent === target && p !== target;
  });
  if (!fs[target]) { printLine(`ls: ${target}: No such directory`, 'err'); return; }
  if (fs[target].type !== 'dir') { printLine(`ls: ${target}: Not a directory`, 'err'); return; }
  if (entries.length === 0) { printLine('  (empty)', 'dim'); return; }
  printLine('', 'blank');
  entries.forEach(p => {
    const name = p.split('/').pop();
    const node = fs[p];
    if (node.type === 'dir') printLine(`  ${name}/`, 'cyan');
    else printLine(`  ${name}`, name.startsWith('.') ? 'dim' : 'out');
  });
  printLine('', 'blank');
}

function cd(args) {
  if (!args[0] || args[0] === '~') {
    if (connectedHost) { cwd = '/'; return; }
    cwd = `/home/${currentUser}`; return;
  }
  const fs = connectedHost ? remoteFS : FS;
  const target = resolvePath(args[0]);
  if (!fs[target]) { printLine(`cd: ${args[0]}: No such directory`, 'err'); return; }
  if (fs[target].type !== 'dir') { printLine(`cd: ${args[0]}: Not a directory`, 'err'); return; }
  cwd = target;
}

function cat(args) {
  if (!args[0]) { printLine('cat: missing operand', 'err'); return; }
  const fs = connectedHost ? remoteFS : FS;
  const target = resolvePath(args[0]);
  if (!fs[target]) { printLine(`cat: ${args[0]}: No such file`, 'err'); return; }
  if (fs[target].type === 'dir') { printLine(`cat: ${args[0]}: Is a directory`, 'err'); return; }
  printLine('', 'blank');
  fs[target].content.split('\n').forEach(line => printLine(line || ' ', 'data'));
  printLine('', 'blank');
}

function startTrace() {
  traceActive = true;
  traceLevel = 0;
  document.getElementById('trace-indicator').style.display = 'block';
  updateTraceUI();

  traceInterval = setInterval(() => {
    traceLevel = Math.min(100, traceLevel + 0.4);
    updateTraceUI();

    if (traceLevel >= 100) {
      stopTrace();
      triggerTraceComplete();
    }
  }, 300);
}

function stopTrace() {
  traceActive = false;
  clearInterval(traceInterval);
  traceInterval = null;
  document.getElementById('trace-indicator').style.display = 'none';
  document.getElementById('sb-trace').querySelector('span').textContent = '—';
}

function updateTraceUI() {
  const pct = Math.floor(traceLevel);
  const fill = document.getElementById('trace-fill');
  const pctEl = document.getElementById('trace-pct');
  const sbTrace = document.getElementById('sb-trace');

  fill.style.width = pct + '%';
  pctEl.textContent = pct + '%';
  sbTrace.querySelector('span').textContent = pct + '%';

  if (pct < 40) {
    fill.style.background = 'var(--green)';
    sbTrace.className = 'sb-item ok';
  } else if (pct < 70) {
    fill.style.background = 'var(--amber)';
    sbTrace.className = 'sb-item warn';
  } else {
    fill.style.background = 'var(--red)';
    sbTrace.className = 'sb-item';
    sbTrace.querySelector('span').style.color = 'var(--red)';
  }
}

function triggerTraceComplete() {
  disconnect();
  const out = document.getElementById('term-output');
  if (!out) return;
  printLines([
    { text: '', cls: 'blank' },
    { text: '████████████████████████████████████████', cls: 'err' },
    { text: '█                                      █', cls: 'err' },
