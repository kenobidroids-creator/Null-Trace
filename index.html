<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NULL//TRACE — OS v0.3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');
:root {
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--bg4:#21262d;--bg5:#2d333b;
  --border:#30363d;--border2:#3d444d;--border3:#484f58;
  --cyan:#00b4d8;--cyan2:#0096b4;--cyan3:#007a94;--cglow:rgba(0,180,216,0.12);
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;--text4:#30363d;
  --green:#3fb950;--gdim:#238636;--gbg:rgba(63,185,80,0.1);
  --red:#f85149;--rdim:#da3633;--rbg:rgba(248,81,73,0.1);
  --amber:#d29922;--adim:#9e6a03;--abg:rgba(210,153,34,0.1);
  --purple:#a371f7;--pbg:rgba(163,113,247,0.1);
  --blue:#58a6ff;--bbg:rgba(88,166,255,0.1);
  --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--mono);background:var(--bg);color:var(--text);width:100vw;height:100vh;overflow:hidden;}
input,textarea{user-select:text;-webkit-user-select:text;pointer-events:all;position:relative;z-index:10;}
#tb,#ws,#sbar,#dicons,.win,.dico,.tab,.wb,.rh{user-select:none;}
#scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:9999;}

/* BOOT */
#boot{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:60px;z-index:1000;font-size:13px;}
.bl{color:var(--text2);line-height:1.6;opacity:0;white-space:pre;}
.bl.ok{color:var(--green);}.bl.warn{color:var(--amber);}.bl.cyan{color:var(--cyan);}.bl.dim{color:var(--text3);}.bl.show{opacity:1;}
#bbar{margin-top:28px;width:380px;display:none;}
#bbar-lbl{color:var(--text3);font-size:11px;letter-spacing:2px;margin-bottom:6px;}
#bbar-t{width:100%;height:2px;background:var(--bg3);}
#bbar-f{height:100%;width:0%;background:var(--cyan);transition:width .04s linear;}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:900;}
.ll{font-size:44px;font-weight:700;color:var(--cyan);letter-spacing:6px;margin-bottom:4px;}
.lv{font-size:11px;color:var(--text3);letter-spacing:4px;margin-bottom:44px;}
.lbox{background:var(--bg2);border:1px solid var(--border);padding:30px 38px;width:360px;position:relative;z-index:950;}
.lf{margin-bottom:14px;}
.llbl{font-size:10px;color:var(--text2);letter-spacing:2px;margin-bottom:5px;display:block;}
.li{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:13px;padding:9px 11px;outline:none;transition:border-color .15s;}
.li:focus{border-color:var(--cyan3);}
.lb{width:100%;background:var(--cyan3);border:none;color:var(--text);font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:3px;padding:11px;cursor:pointer;margin-top:6px;transition:background .15s;}
.lb:hover{background:var(--cyan);}
.le{font-size:11px;color:var(--red);margin-top:10px;min-height:15px;}
.lh{font-size:10px;color:var(--text3);margin-top:20px;text-align:center;letter-spacing:1px;}

/* DESKTOP */
#desktop{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;}

/* TASKBAR */
#tb{height:30px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 10px;flex-shrink:0;z-index:100;}
#tb-l{display:flex;align-items:center;gap:14px;}
.tb-logo{font-size:11px;font-weight:700;color:var(--cyan);letter-spacing:2px;}
.tb-apps{display:flex;gap:3px;}
.tab{background:transparent;border:1px solid transparent;color:var(--text2);font-family:var(--mono);font-size:9px;padding:2px 7px;cursor:pointer;letter-spacing:1px;transition:all .1s;}
.tab:hover{color:var(--cyan);border-color:var(--border);background:var(--bg3);}
.tab.active{color:var(--cyan);border-color:var(--cyan3);background:var(--cglow);}
.tab.minimized{opacity:0.5;}
#tb-r{display:flex;align-items:center;gap:12px;}
.tbs{font-size:9px;color:var(--text3);}
.tbs span{color:var(--text2);}
.tbs.warn span{color:var(--amber);}
.tbs.danger span{color:var(--red);}
.tbs.ok span{color:var(--green);}
#tb-clk{font-size:10px;color:var(--text2);}

/* WORKSPACE */
#ws{flex:1;position:relative;overflow:hidden;}

/* DESKTOP ICONS */
#dicons{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:6px;z-index:1;}
.dico{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px;width:68px;cursor:pointer;border:1px solid transparent;transition:all .1s;}
.dico:hover{background:var(--cglow);border-color:var(--cyan3);}
.dico-g{font-size:18px;color:var(--cyan);}
.dico-l{font-size:8px;color:var(--text2);letter-spacing:1px;text-align:center;}

/* WINDOWS */
.win{position:absolute;background:var(--bg2);border:1px solid var(--border);display:flex;flex-direction:column;min-width:280px;min-height:180px;box-shadow:0 8px 32px rgba(0,0,0,0.6);}
.win.focused{border-color:var(--border2);box-shadow:0 8px 32px rgba(0,0,0,0.8),0 0 0 1px rgba(0,180,216,0.08);}
.wtb{height:28px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;cursor:move;flex-shrink:0;gap:7px;}
.wbtns{display:flex;gap:4px;}
.wb{width:9px;height:9px;border-radius:50%;border:none;cursor:pointer;transition:opacity .1s;}
.wb.cl{background:var(--rdim);}.wb.mn{background:var(--adim);}.wb.mx{background:var(--gdim);}
.wb:hover{opacity:.75;}
.wt{flex:1;font-size:9px;letter-spacing:2px;color:var(--text3);text-align:center;}
.wbody{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.rh{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:se-resize;}
.rh::after{content:'';position:absolute;bottom:3px;right:3px;width:6px;height:6px;border-right:1px solid var(--border3);border-bottom:1px solid var(--border3);}

/* STATUS BAR */
#sbar{height:20px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:14px;flex-shrink:0;}
.sbi{font-size:8px;letter-spacing:1px;color:var(--text3);}
.sbi span{color:var(--text2);}
.sbi.ok span{color:var(--green);}
.sbi.warn span{color:var(--amber);}
.sbi.danger span{color:var(--red);}

/* TERMINAL */
#tout{flex:1;overflow-y:auto;padding:10px 12px;font-size:11.5px;line-height:1.7;scroll-behavior:smooth;}
#tout::-webkit-scrollbar{width:3px;}
#tout::-webkit-scrollbar-thumb{background:var(--border2);}
.tl{white-space:pre-wrap;word-break:break-all;}
.tl.cmd{color:var(--cyan);}.tl.out{color:var(--text2);}.tl.ok{color:var(--green);}.tl.err{color:var(--red);}.tl.warn{color:var(--amber);}.tl.info{color:var(--purple);}.tl.data{color:var(--text);}.tl.dim{color:var(--text3);}.tl.cyan{color:var(--cyan);}.tl.blank{height:6px;display:block;}.tl.blue{color:var(--blue);}
.tpr{display:flex;align-items:center;padding:3px 12px 7px;gap:0;flex-shrink:0;border-top:1px solid var(--border);}
.tprl{font-size:11.5px;color:var(--cyan);white-space:nowrap;flex-shrink:0;}
#tinp{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--mono);font-size:11.5px;outline:none;caret-color:var(--cyan);}

/* CRACKER PROGRESS */
.crack-bar{height:3px;background:var(--bg4);margin:4px 0;}
.crack-fill{height:100%;background:var(--amber);transition:width .1s;}

/* NET MAP */
.netmap-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);}
#netmap-svg{width:100%;height:100%;}
.node-group{cursor:pointer;}
.node-group:hover .node-rect{filter:brightness(1.3);}
.node-label{font-family:var(--mono);font-size:9px;fill:var(--text2);text-anchor:middle;}
.node-sublabel{font-family:var(--mono);font-size:8px;fill:var(--text3);text-anchor:middle;}
.conn-line{stroke:var(--border2);stroke-width:1;stroke-dasharray:4 3;}
.conn-line.active{stroke:var(--cyan);stroke-width:1.5;stroke-dasharray:none;animation:dash .8s linear infinite;}
@keyframes dash{to{stroke-dashoffset:-20;}}
.node-status{font-family:var(--mono);font-size:7px;text-anchor:middle;}

/* MAIL */
.ml-wrap{display:flex;height:100%;}
.ml-list{width:200px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;}
.ml-list::-webkit-scrollbar{width:3px;}
.ml-list::-webkit-scrollbar-thumb{background:var(--border2);}
.ml-hdr{font-size:8px;letter-spacing:2px;color:var(--text3);padding:8px 10px 5px;border-bottom:1px solid var(--border);}
.mi{padding:9px 10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.mi:hover{background:var(--bg3);}
.mi.sel{background:var(--cglow);border-left:2px solid var(--cyan);}
.mi.unread .mifrom{color:var(--text);font-weight:700;}
.mifrom{font-size:10px;color:var(--text2);margin-bottom:2px;}
.misubj{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mitime{font-size:8px;color:var(--text3);float:right;}
.mv{flex:1;padding:14px;overflow-y:auto;font-size:11px;}
.mv::-webkit-scrollbar{width:3px;}
.mv::-webkit-scrollbar-thumb{background:var(--border2);}
.mv-subj{font-size:13px;color:var(--text);margin-bottom:6px;font-weight:500;}
.mv-meta{font-size:9px;color:var(--text3);line-height:1.9;}
.mv-meta span{color:var(--text2);}
.mv-body{color:var(--text2);line-height:1.9;font-size:10.5px;white-space:pre-wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.mv-empty{flex:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);letter-spacing:2px;}

/* SYSMON */
.sm-body{padding:10px;font-size:10px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.sm-stitle{font-size:8px;letter-spacing:3px;color:var(--text3);margin-bottom:6px;}
.sm-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.sm-k{color:var(--text3);}.sm-v{color:var(--text2);}
.sm-v.ok{color:var(--green);}.sm-v.warn{color:var(--amber);}.sm-v.danger{color:var(--red);}
.btr{height:3px;background:var(--bg4);margin-top:3px;margin-bottom:8px;}
.bfill{height:100%;background:var(--cyan);transition:width .5s;}
.bfill.ok{background:var(--green);}.bfill.warn{background:var(--amber);}.bfill.danger{background:var(--red);}
.smdiv{border:none;border-top:1px solid var(--border);margin:2px 0;}

/* SECURITY STATES */
.sec-nominal{color:#3fb950;}.sec-suspicious{color:#d29922;}.sec-incident{color:#f85149;}.sec-lockdown{color:#a371f7;}
.sec-badge{font-size:9px;padding:1px 5px;letter-spacing:1px;font-family:var(--mono);}
.sec-badge.nominal{background:rgba(63,185,80,0.1);border:1px solid #238636;}
.sec-badge.suspicious{background:rgba(210,153,34,0.1);border:1px solid #9e6a03;}
.sec-badge.incident{background:rgba(248,81,73,0.1);border:1px solid #da3633;}
.sec-badge.lockdown{background:rgba(163,113,247,0.1);border:1px solid #7a3fc0;}
/* ADMIN ALERT MAIL */
.mi.alert .mifrom{color:var(--red);}
.mi.alert{border-left:2px solid var(--red);}
/* SECMON panel */
.secmon-wrap{padding:10px;font-size:10px;overflow-y:auto;}
.secmon-node{padding:7px 8px;border:1px solid var(--border);margin-bottom:5px;background:var(--bg3);}
.secmon-node-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.secmon-node-name{font-size:10px;color:var(--text2);font-weight:700;}
.secmon-event{font-size:9px;color:var(--text3);margin-top:2px;padding-left:6px;border-left:1px solid var(--border);}
.secmon-event.warn{color:var(--amber);}.secmon-event.err{color:var(--red);}

.exfil-wrap{padding:10px;font-size:10px;overflow-y:auto;}
.exfil-hdr{font-size:8px;letter-spacing:3px;color:var(--text3);margin-bottom:8px;}
.exfil-item{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border:1px solid var(--border);margin-bottom:4px;background:var(--bg3);}
.exfil-name{color:var(--text2);font-size:10px;}
.exfil-tag{font-size:8px;padding:2px 5px;letter-spacing:1px;}
.exfil-tag.high{background:var(--rbg);color:var(--red);}
.exfil-tag.med{background:var(--abg);color:var(--amber);}
.exfil-tag.low{background:var(--gbg);color:var(--green);}
.exfil-empty{color:var(--text3);font-size:10px;padding:8px;letter-spacing:1px;}

/* MISSION PANEL */
.mission-wrap{padding:12px;font-size:10px;overflow-y:auto;}
.mission-title{font-size:12px;color:var(--cyan);font-weight:700;margin-bottom:4px;letter-spacing:1px;}
.mission-sub{font-size:9px;color:var(--text3);margin-bottom:12px;letter-spacing:1px;}
.obj-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.obj-check{width:12px;height:12px;border:1px solid var(--border3);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;}
.obj-check.done{background:var(--gbg);border-color:var(--gdim);color:var(--green);}
.obj-check.fail{background:var(--rbg);border-color:var(--rdim);color:var(--red);}
.obj-text{color:var(--text2);line-height:1.5;}
.obj-text.done{color:var(--text3);text-decoration:line-through;}
.obj-hint{font-size:9px;color:var(--text3);margin-top:2px;}
.mission-reward{margin-top:10px;padding:8px;background:var(--bg3);border:1px solid var(--border);}
.mission-reward-lbl{font-size:8px;letter-spacing:2px;color:var(--text3);margin-bottom:4px;}
.mission-reward-val{color:var(--amber);font-size:11px;}

/* TRACE WIDGET */
#trace-ind{position:fixed;bottom:28px;right:14px;width:190px;background:var(--bg2);border:1px solid var(--border);padding:8px 10px;z-index:500;display:none;pointer-events:none;}
.tr-lbl{font-size:8px;letter-spacing:2px;color:var(--text3);margin-bottom:5px;display:flex;justify-content:space-between;}
#tr-pct{color:var(--red);}
.tr-t{height:3px;background:var(--bg4);}
#tr-f{height:100%;width:0%;background:var(--green);transition:width .25s,background .25s;}

/* NOTIFICATION */
#notif{position:fixed;top:40px;right:14px;background:var(--bg3);border:1px solid var(--border);padding:8px 12px;z-index:800;display:none;font-size:10px;max-width:260px;animation:slideIn .2s ease;}
#notif.ok{border-color:var(--gdim);background:var(--gbg);}
#notif.warn{border-color:var(--adim);background:var(--abg);}
#notif.err{border-color:var(--rdim);background:var(--rbg);}
#notif.info{border-color:var(--cyan3);background:var(--cglow);}
#notif-txt{color:var(--text2);}
@keyframes slideIn{from{opacity:0;transform:translateX(10px);}to{opacity:1;transform:none;}}

.fade-in{animation:fi .25s ease forwards;}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
.blink{animation:blk 1s step-end infinite;}
@keyframes blk{50%{opacity:0;}}
</style>
</head>
<body>

<!-- BOOT -->

<!-- LOGIN -->
<div id="login">
  <div class="ll">NULL//TRACE</div>
  <div class="lv">OS v0.3.0 — M3 BUILD</div>
  <div class="lbox">
    <div class="lf"><label class="llbl">ALIAS</label><input class="li" id="lu" type="text" value="ghost_0x1" autocomplete="off" spellcheck="false" tabindex="1"></div>

<div id="desktop">

      <div class="tb-logo">N//T</div>

        <button class="tab" onclick="openApp('terminal')">TERM//</button>

      <div class="dico" ondblclick="openApp('terminal')"><div class="dico-g">❯_</div><div class="dico-l">TERM//</div></div>
      <div class="dico" ondblclick="openApp('netmap')"><div class="dico-g">⬡</div><div class="dico-l">NET//MAP</div></div>
      <div class="dico" ondblclick="openApp('mail')"><div class="dico-g">@</div><div class="dico-l">MAIL//</div></div>
      <div class="dico" ondblclick="openApp('secmon')"><div class="dico-g">◈</div><div class="dico-l">SEC//MON</div></div>

  <div id="sbar">

    <div class="sbi" id="sb-node">NODE:<span>—</span></div>
    <div class="sbi" id="sb-path">PATH:<span>—</span></div>
    <div class="sbi" id="sb-obj" style="margin-left:auto">OBJ:<span>0/4</span></div>
    <div class="sbi" id="sb-trace">TRACE:<span>—</span></div>
  </div>
</div>

<div id="trace-ind"><div class="tr-lbl">TRACE DETECTION<span id="tr-pct">0%</span></div><div class="tr-t"><div id="tr-f"></div></div></div>
<div id="notif"><div id="notif-txt"></div></div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let currentUser = 'ghost_0x1';
let cwd = '/home/ghost_0x1';
let connectedNode = null;   // current node id
let traceLevel = 0;
let traceActive = false;
let traceTimer = null;
let traceRate = 0.35;
let sessionStart = 0;
let rep = 0;
let termHistory = [], histIdx = -1;
let exfilVault = [];        // banked stolen files
let logsDeleted = {};       // nodeId -> bool
let crackedPasswords = {};  // filename -> plaintext
let objectivesDone = {};

// ══════════════════════════════════════════════
// M3 — SECURITY FSM
// ══════════════════════════════════════════════
const SEC_STATES = ['NOMINAL','SUSPICIOUS','INCIDENT','LOCKDOWN'];
const nodeSecState = {'GATEWAY':'NOMINAL','WEB-SRV':'NOMINAL','MAIL-SRV':'NOMINAL','DB-SRV':'NOMINAL','EXEC-TERM':'NOMINAL'};
const nodeSecEvents = {'GATEWAY':[],'WEB-SRV':[],'MAIL-SRV':[],'DB-SRV':[],'EXEC-TERM':[]};
const patchedExploits = {};
const nodeVisitCount = {};
const adminAlerts = [];
const SEC_TRACE_MULT = {NOMINAL:1.0,SUSPICIOUS:1.6,INCIDENT:2.8,LOCKDOWN:5.0};

function getSecState(id){return nodeSecState[id]||'NOMINAL';}

function escalateSecurity(nodeId,reason,newState){
  const current=getSecState(nodeId);
  if(SEC_STATES.indexOf(newState)<=SEC_STATES.indexOf(current))return;
  nodeSecState[nodeId]=newState;
  nodeSecEvents[nodeId].push({state:newState,reason,time:ticks});
  const stateClass={SUSPICIOUS:'warn',INCIDENT:'err',LOCKDOWN:'err'}[newState]||'out';
  if(connectedNode===nodeId){
    pline('',  'blank');
    if(newState==='SUSPICIOUS'){
      pline(`[!] SECURITY: ${NETWORK[nodeId].label} → SUSPICIOUS`,'warn');

      pline(`[!!] INCIDENT DECLARED — ${NETWORK[nodeId].label}`,'err');

      pline(`[!!] Trace rate CRITICAL. Entry vector being patched.`,'err');

<div style="font-size:8px;color:var(--text3);margin-bottom:3px;">${n.ip}</div>`;

function showLogin(){

function doLogin(){
  const u=document.getElementById('lu').value.trim();

function launchDesktop(){

let ticks=0;
function startClock(){
  setInterval(()=>{
    ticks++;
    const h=String(Math.floor(ticks/3600)).padStart(2,'0');
    const m=String(Math.floor((ticks%3600)/60)).padStart(2,'0');
    const s=String(ticks%60).padStart(2,'0');
    document.getElementById('tb-clk').textContent=`${h}:${m}:${s}`;
  },1000);
}

const WDEFS={
  terminal:{title:'TERM// — NULL//TRACE',w:680,h:440,x:100,y:50},
  netmap:  {title:'NET//MAP — AXIOM CORP',w:560,h:420,x:340,y:60},

  mission: {title:'MISSION// — OP-VORTEX',w:380,h:380,x:420,y:70},
  secmon:  {title:'SEC//MON — SECURITY',  w:340,h:420,x:460,y:90},
  sysmon:  {title:'SYS// — MONITOR',      w:300,h:360,x:300,y:90},
};

function openApp(id){
  if(WINS[id]){
    if(WINS[id].minimized){WINS[id].el.style.display='flex';WINS[id].minimized=false;}
    focusWin(id); return;
  }
  const def=WDEFS[id];
  const win=document.createElement('div');
  win.className='win'; win.id=`win-${id}`;
  win.style.cssText=`width:${def.w}px;height:${def.h}px;left:${def.x}px;top:${def.y}px;z-index:${++zCnt};`;
  win.classList.add('fade-in');
  win.innerHTML=`<div class="wtb" id="wtb-${id}"><div class="wbtns"><button class="wb cl" onclick="closeApp('${id}')"></button><button class="wb mn" onclick="minApp('${id}')"></button><button class="wb mx" onclick="maxApp('${id}')"></button></div><div class="wt">${def.title}</div><div style="width:22px"></div></div><div class="wbody" id="wbody-${id}"></div><div class="rh" id="rh-${id}"></div>`;
  document.getElementById('ws').appendChild(win);
  WINS[id]={el:win,minimized:false,maximized:false,orig:null};
  makeDrag(win,document.getElementById(`wtb-${id}`));
  makeResize(win,document.getElementById(`rh-${id}`));
  win.addEventListener('mousedown',()=>focusWin(id));
  buildApp(id);
  focusWin(id);
  syncTabs();
}

function focusWin(id){
  if(focusedWin&&WINS[focusedWin])WINS[focusedWin].el.classList.remove('focused');
  focusedWin=id;
  if(WINS[id]){WINS[id].el.classList.add('focused');WINS[id].el.style.zIndex=++zCnt;}
  if(id==='terminal')setTimeout(()=>document.getElementById('tinp')?.focus(),50);
}
function closeApp(id){
  if(!WINS[id])return;
  WINS[id].el.remove(); delete WINS[id];
  if(focusedWin===id)focusedWin=null;
  syncTabs();
}
function minApp(id){
  if(!WINS[id])return;
  WINS[id].minimized=!WINS[id].minimized;
  WINS[id].el.style.display=WINS[id].minimized?'none':'flex';
  syncTabs();
}
function maxApp(id){
  if(!WINS[id])return;
  const w=WINS[id],ws=document.getElementById('ws');
  if(!w.maximized){
    w.orig={left:w.el.style.left,top:w.el.style.top,width:w.el.style.width,height:w.el.style.height};
    w.el.style.left='0';w.el.style.top='0';
    w.el.style.width=ws.clientWidth+'px';w.el.style.height=ws.clientHeight+'px';
    w.maximized=true;
  } else {
    Object.assign(w.el.style,w.orig); w.maximized=false;
  }
}
function syncTabs(){
  document.querySelectorAll('.tab').forEach(btn=>{
    const m=btn.getAttribute('onclick')?.match(/'(\w+)'/);
    if(!m)return;
    const id=m[1];
    btn.classList.remove('active','minimized');
    if(WINS[id]){btn.classList.add('active');if(WINS[id].minimized)btn.classList.add('minimized');}
  });
}
function makeDrag(win,handle){
  let ox,oy,sl,st;
  handle.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('wb'))return;
    ox=e.clientX;oy=e.clientY;sl=parseInt(win.style.left)||0;st=parseInt(win.style.top)||0;
    const mv=ev=>{win.style.left=Math.max(0,sl+ev.clientX-ox)+'px';win.style.top=Math.max(0,st+ev.clientY-oy)+'px';};
    const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);e.preventDefault();
  });
}
function makeResize(win,handle){
  handle.addEventListener('mousedown',e=>{
    const sw=parseInt(win.style.width),sh=parseInt(win.style.height),sx=e.clientX,sy=e.clientY;
    const mv=ev=>{win.style.width=Math.max(280,sw+ev.clientX-sx)+'px';win.style.height=Math.max(180,sh+ev.clientY-sy)+'px';};
    const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);e.preventDefault();
  });
}

function getPrompt(){

function onTermKey(e){
  if(e.target.id !== 'tinp') return;
  if(e.key==='Enter'){
    const cmd=e.target.value.trim(); e.target.value='';
    if(cmd){termHistory.unshift(cmd);histIdx=-1;}
    pline(`${getPrompt()}${cmd}`,'cmd');
    if(cmd)runCmd(cmd);
    scrollT();
  } else if(e.key==='ArrowUp'){
    histIdx=Math.min(histIdx+1,termHistory.length-1);
    e.target.value=termHistory[histIdx]||''; e.preventDefault();
  } else if(e.key==='ArrowDown'){
    histIdx=Math.max(histIdx-1,-1);
    e.target.value=histIdx>=0?termHistory[histIdx]:''; e.preventDefault();
  }
}
function pline(txt,cls='out'){
  const out=document.getElementById('tout'); if(!out)return;
  const el=document.createElement('div');
  el.className=`tl ${cls}`; el.textContent=txt||' '; out.appendChild(el);
}

function scrollT(){const out=document.getElementById('tout');if(out)out.scrollTop=out.scrollHeight;}

function runCmd(raw){
  const parts=raw.trim().split(/\s+/);
  const cmd=parts[0].toLowerCase(); const args=parts.slice(1);
  const MAP={
    help,clear,pwd,ls,cd,cat,mkdir,touch,rm,whoami,status,ifconfig,
    scan,connect,disconnect,crack,exfil:cmdExfil,'rm-logs':rmLogs,'fw-unlock':fwUnlock,
    secstate:cmdSecstate,
    echo:()=>pline(args.join(' ')),
    history:()=>termHistory.forEach((h,i)=>pline(`  ${i+1}  ${h}`,'dim')),
    nodes:()=>listNodes(),
    date:()=>pline(new Date().toISOString()),
    uname:()=>pline('phantom-3.8 NULL//TRACE-OS x86_64'),
    man:()=>pline('No man pages. Use help.','warn'),
    sudo:()=>pline('Already operator-level. No escalation needed.','warn'),
  };
  if(MAP[cmd])MAP[cmd](args);
  else{pline(`command not found: ${cmd}`,'err');pline(`Type 'help' for commands`,'dim');}
  updatePrompt(); scrollT();
}

function getCFS(){
  if(connectedNode){const n=NETWORK[connectedNode];return n?n.fs:LFS;}
  return LFS;
}
function resolvePath(p){
  if(p==='..'){ const pts=cwd.split('/').filter(Boolean);pts.pop();return '/'+pts.join('/')||'/'; }
  if(p.startsWith('/'))return p.replace(/\/+$/,'')||'/';
  const base=cwd==='/'?'':cwd;
  return `${base}/${p}`.replace(/\/+/g,'/');
}

function ls(args){
  const fs=getCFS(); const target=args[0]?resolvePath(args[0]):cwd;
  const entries=Object.keys(fs).filter(p=>{const par=p.substring(0,p.lastIndexOf('/'))||'/';return par===target&&p!==target;});
  if(!fs[target]){pline(`ls: no such directory: ${target}`,'err');return;}
  if(fs[target].t!=='d'){pline(`ls: not a directory: ${target}`,'err');return;}
  if(!entries.length){pline('  (empty)','dim');return;}
  pline('','blank');
  entries.forEach(p=>{
    const name=p.split('/').pop();const node=fs[p];
    if(node.t==='d')pline(`  ${name}/`,'cyan');
    else{
      let extra='';
      if(node.exfil==='high')extra=' [HIGH VALUE]';
      else if(node.exfil==='med')extra=' [SENSITIVE]';
      pline(`  ${name}${extra}`,name.startsWith('.')?'dim':node.exfil?'warn':'out');
    }
  });
  pline('','blank');
}
function cd(args){
  if(!args[0]||args[0]==='~'){cwd=connectedNode?'/':'/home/'+currentUser;return;}
  const fs=getCFS();const target=resolvePath(args[0]);
  if(!fs[target]){pline(`cd: no such directory: ${args[0]}`,'err');return;}
  if(fs[target].t!=='d'){pline(`cd: not a directory: ${args[0]}`,'err');return;}
  cwd=target;
}
function cat(args){
  if(!args[0]){pline('cat: missing operand','err');return;}
  const fs=getCFS();const target=resolvePath(args[0]);
  if(!fs[target]){pline(`cat: no such file: ${args[0]}`,'err');return;}
  if(fs[target].t==='d'){pline(`cat: is a directory: ${args[0]}`,'err');return;}
  pline('','blank');
  fs[target].content.split('\n').forEach(l=>pline(l||' ','data'));
  pline('','blank');
  // Intelligence trigger — check for creds/tokens
  const c=fs[target].content;
  if(c.includes('AX-EXEC-'))notify('Intel extracted — exec token found in file','info');
  if(c.includes('Sull1van#2024'))notify('Credential found: ksullivan password extracted','info');
  if(c.includes('Ax10m_W3b!2024'))notify('Credential found: webapp DB password extracted','info');
  // M3 — inline objective check for exec token
  if(connectedNode && c.includes('AX-EXEC-7f3a9b2c1d')) markObjective('creds');
}
function mkdir(args){
  if(!args[0]){pline('mkdir: missing operand','err');return;}
  const target=resolvePath(args[0]);
  if(LFS[target]){pline(`mkdir: already exists`,'err');return;}
  LFS[target]={t:'d'};pline(`Directory created: ${args[0]}`,'ok');
}
function touch(args){
  if(!args[0]){pline('touch: missing operand','err');return;}
  const target=resolvePath(args[0]);
  if(!LFS[target])LFS[target]={t:'f',content:''};
  pline(`File created: ${args[0]}`,'ok');
}
function rm(args){
  if(!args[0]){pline('rm: missing operand','err');return;}
  const target=resolvePath(args[0]);
  if(!LFS[target]){pline(`rm: no such file: ${args[0]}`,'err');return;}
  delete LFS[target];pline(`Removed: ${args[0]}`,'ok');
}

// ── SCAN ──
function scan(args){
  const id=resolveNode(args[0]);
  if(!id){pline(`scan: unknown target: ${args[0]||'(none)'}. Try node name or IP.`,'err');return;}
  const n=NETWORK[id];
  plines([{t:'',c:'blank'},{t:`[*] Scanning ${n.ip} (${n.label})...`,c:'info'},{t:`[*] Probing ${n.services.length} services...`,c:'dim'}]);
  setTimeout(()=>{
    plines([
      {t:'',c:'blank'},
      {t:`SCAN :: ${n.label} (${n.ip})`,c:'cyan'},
      {t:'─────────────────────────────────────',c:'dim'},
      {t:`OS         ${n.os}`,c:'data'},
      {t:`Tier       ${n.tier.toUpperCase()}`,c:'data'},
      {t:`Security   ${n.security}`,c:n.security==='LOW'?'ok':n.security==='NOMINAL'?'warn':n.security==='HIGH'?'err':'err'},
      {t:`Firewall   ${n.firewall?(firewallUnlocked[id]?'BYPASSED':'ACTIVE — requires credentials'):'none'}`,c:n.firewall&&!firewallUnlocked[id]?'err':'ok'},
      {t:'',c:'blank'},
      {t:'PORT     SERVICE   VERSION                  STATE',c:'cyan'},
    ]);
    n.services.forEach(s=>pline(`${String(s.port).padEnd(8)} ${s.svc.padEnd(9)} ${s.ver.padEnd(24)} open`,'ok'));
    pline('','blank');
    if(n.firewall&&!firewallUnlocked[id])
      plines([{t:`[!] Firewall active. Hint: ${n.firewallCred.hint}`,c:'warn'},{t:`[*] Use: fw-unlock ${id} <user> <pass>`,c:'dim'}]);
    else
      pline(`[+] Use: connect ${id}`,'ok');
    pline('','blank');
    // Save scan intel
    LFS[`/home/${currentUser}/intel/${id}.scan`]={t:'f',content:`SCAN:${id}\nIP:${n.ip}\nOS:${n.os}\nSECURITY:${n.security}`};
    pline(`[*] Scan saved → ~/intel/${id}.scan`,'dim');
    scrollT();
    refreshNetmap();
  },900);
}

// ── FIREWALL UNLOCK ──
function fwUnlock(args){
  // fw-unlock [node] [user] [pass]
  const [nodeArg,user,...passParts]=args;
  const pass=passParts.join(' ');
  const id=resolveNode(nodeArg);
  if(!id){pline(`fw-unlock: unknown node: ${nodeArg}`,'err');return;}
  const n=NETWORK[id];
  if(!n.firewall||firewallUnlocked[id]){pline(`${id}: no active firewall`,'warn');return;}
  if(user===n.firewallCred.user&&pass===n.firewallCred.pass){
    firewallUnlocked[id]=true;
    plines([
      {t:'',c:'blank'},
      {t:`[+] FIREWALL BYPASSED — ${n.label}`,c:'ok'},
      {t:`[+] Credentials accepted: ${user}`,c:'ok'},
      {t:`[*] Use: connect ${id}`,c:'dim'},
      {t:'',c:'blank'},
    ]);
    notify(`Firewall bypassed: ${n.label}`,'ok');
    refreshNetmap();
  } else {
    plines([{t:'[!] FIREWALL: credentials rejected',c:'err'},{t:'[!] ALERT: Failed auth attempt logged',c:'err'},{t:'',c:'blank'}]);
    if(traceActive)traceLevel=Math.min(100,traceLevel+8);
    checkSecOnFailedAuth(id);
  }
}

function connect(args){
  const id=resolveNode(args[0]);
  if(!id){pline(`connect: unknown target: ${args[0]||'(none)'}`,'err');return;}
  if(connectedNode){pline(`Already connected to ${connectedNode}. Disconnect first.`,'warn');return;}
  const n=NETWORK[id];
  if(n.firewall&&!firewallUnlocked[id]){
    plines([
      {t:`[!] FIREWALL ACTIVE — ${n.label}`,c:'err'},
      {t:`[!] Hint: ${n.firewallCred.hint}`,c:'warn'},
      {t:`[*] Use: fw-unlock ${id} <user> <pass>`,c:'dim'},
    ]);
    return;
  }
  // M3 — block if exploit was patched after INCIDENT
  if(patchedExploits[id]){
    plines([
      {t:`[!] CONNECTION REFUSED — ${n.label}`,c:'err'},
      {t:`[!] Entry vector patched after incident response`,c:'err'},
      {t:`[!] Security state: ${getSecState(id)} — new credentials required`,c:'warn'},
      {t:`[*] Find alternate credentials or wait for security to downgrade`,c:'dim'},
    ]);
    return;
  }
  plines([{t:'',c:'blank'},{t:`[*] Connecting to ${n.label} (${n.ip})...`,c:'info'},{t:`[*] Negotiating session...`,c:'dim'}]);
  setTimeout(()=>{
    connectedNode=id; cwd='/'; traceRate=n.traceRate;
    updatePrompt();
    plines([
      {t:'',c:'blank'},
      {t:`[+] SESSION ESTABLISHED — ${n.label}`,c:'ok'},
      {t:`[+] IP: ${n.ip}  |  OS: ${n.os}`,c:'data'},
      {t:`[!] TRACE ACTIVE — rate: ${(n.traceRate*3.3).toFixed(1)}%/sec`,c:'err'},
      {t:`[!] Security level: ${n.security}`,c:n.security==='LOW'?'ok':n.security==='HIGH'||n.security==='CRITICAL'?'err':'warn'},
      {t:'',c:'blank'},
    ]);
    document.getElementById('tb-conn').querySelector('span').textContent=n.label;
    document.getElementById('tb-conn').className='tbs warn';
    document.getElementById('sb-node').querySelector('span').textContent=n.label;
    document.getElementById('sb-path').querySelector('span').textContent=n.ip;
    startTrace();
    checkSecOnConnect(id);
    // M3 — inline objective check for EXEC-TERM access
    if(id==='EXEC-TERM') setTimeout(()=>{ if(connectedNode==='EXEC-TERM') markObjective('access'); },900);
    refreshNetmap();
    scrollT();
  },800);
}

// ── DISCONNECT ──
function disconnect(){
  if(!connectedNode){pline('Not connected.','warn');return;}
  const old=NETWORK[connectedNode];
  const wasLogged=!logsDeleted[connectedNode];
  connectedNode=null; cwd=`/home/${currentUser}`;
  stopTrace(); updatePrompt();
  document.getElementById('tb-conn').querySelector('span').textContent='OFFLINE';
  document.getElementById('tb-conn').className='tbs';
  document.getElementById('sb-node').querySelector('span').textContent='—';
  document.getElementById('sb-path').querySelector('span').textContent='—';
  plines([
    {t:'',c:'blank'},
    {t:`[+] Disconnected from ${old.label}`,c:'ok'},
    {t:wasLogged?`[!] Session logs remain on ${old.label} — traces left behind`:`[+] Logs deleted — clean exit`,c:wasLogged?'warn':'ok'},
    {t:'',c:'blank'},
  ]);
  checkCleanObjective();
  refreshNetmap();
}

// ── CRACK ──
function crack(args){
  if(!args[0]){pline('Usage: crack [file]','err');return;}
  const fs=getCFS(); const target=resolvePath(args[0]);
  if(!fs[target]){pline(`crack: file not found: ${args[0]}`,'err');return;}
  const fname=args[0].split('/').pop();
  if(crackedPasswords[fname]){pline(`[*] Already cracked: ${crackedPasswords[fname]}`,'ok');return;}

  plines([{t:'',c:'blank'},{t:`[*] Loading cracker — target: ${fname}`,c:'info'},{t:`[*] Running dictionary + pattern analysis...`,c:'dim'}]);

  // Simulate cracking progress
  let prog=0;
  const out=document.getElementById('tout');
  const barEl=document.createElement('div');
  barEl.className='tl out crack-bar-wrap';
  barEl.innerHTML=`<span style="color:var(--text3)">  [</span><span id="crack-prog" style="color:var(--amber)">░░░░░░░░░░░░░░░░░░░░</span><span style="color:var(--text3)">] </span><span id="crack-pct" style="color:var(--text2)">0%</span>`;
  if(out)out.appendChild(barEl);

  // Pick a password to "crack" based on file content
  let result=null;
  const content=fs[target].content||'';
  if(content.includes('Sull1van'))result='Sull1van#2024';
  else if(content.includes('Ax10m'))result='Ax10m_W3b!2024';
  else if(content.includes('AX-EXEC'))result='AX-EXEC-7f3a9b2c1d';
  else result='axiom2024';  // fallback generic

  const total=40+Math.floor(Math.random()*30);
  const iv=setInterval(()=>{
    prog+=2;
    const pct=Math.min(100,Math.floor(prog/total*100));
    const filled=Math.floor(pct/5);
    const bar='█'.repeat(filled)+'░'.repeat(20-filled);
    document.getElementById('crack-prog').textContent=bar;
    document.getElementById('crack-pct').textContent=pct+'%';
    if(prog>=total){
      clearInterval(iv);
      crackedPasswords[fname]=result;
      plines([
        {t:'',c:'blank'},
        {t:`[+] CRACKED — ${fname}`,c:'ok'},
        {t:`[+] Plaintext: ${result}`,c:'green'},
        {t:'',c:'blank'},
      ]);
      notify(`Password cracked: ${result}`,'ok');
      scrollT();
    }
  },120);
  scrollT();
}

// ── EXFIL ──
function cmdExfil(args){
  if(!connectedNode){pline('exfil: not connected to a remote node','err');return;}
  if(!args[0]){pline('Usage: exfil [file]','err');return;}
  const fs=getCFS(); const target=resolvePath(args[0]);
  if(!fs[target]){pline(`exfil: file not found: ${args[0]}`,'err');return;}
  if(fs[target].t==='d'){pline('exfil: cannot exfil a directory','err');return;}

  const fname=args[0].split('/').pop();
  if(exfilVault.find(f=>f.name===fname)){pline(`[*] ${fname} already in vault`,'warn');return;}

  const node=NETWORK[connectedNode];
  const fdata=fs[target];
  plines([{t:'',c:'blank'},{t:`[*] Exfiltrating: ${fname}`,c:'info'},{t:`[*] Routing through local tunnel...`,c:'dim'}]);

  setTimeout(()=>{
    const entry={name:fname,from:node.label,ip:node.ip,value:fdata.exfil||'low',content:fdata.content,time:ticks};
    exfilVault.push(entry);
    LFS[`/home/${currentUser}/intel/exfil/${fname}`]={t:'f',content:fdata.content};

    plines([
      {t:`[+] EXFILTRATED: ${fname}`,c:'ok'},
      {t:`[+] Value: ${(fdata.exfil||'low').toUpperCase()}  |  Banked to ~/intel/exfil/`,c:'ok'},
      {t:'',c:'blank'},
    ]);
    notify(`Exfil: ${fname} (${(fdata.exfil||'low').toUpperCase()})`,fdata.exfil==='high'?'ok':'info');

    // Bump trace a bit — exfil is noisy
    if(traceActive)traceLevel=Math.min(100,traceLevel+6);
    // M3 — trigger security escalation on exfil
    checkSecOnExfil(connectedNode);

    // Check mission objectives
    if(fname==='acquisition_plan.pdf.txt'){ markObjective('exfil'); }
    refreshExfil();
    scrollT();
  },1100);
}

// ── RM-LOGS ──
function rmLogs(){
  if(!connectedNode){pline('rm-logs: not connected to a remote node','err');return;}
  const n=NETWORK[connectedNode];
  if(logsDeleted[connectedNode]){pline('[*] Logs already deleted on this node','warn');return;}

  plines([{t:'',c:'blank'},{t:`[*] Locating session logs on ${n.label}...`,c:'info'}]);
  setTimeout(()=>{
    logsDeleted[connectedNode]=true;
    plines([
      {t:`[+] Session logs purged — ${n.label}`,c:'ok'},
      {t:`[+] Access entries deleted`,c:'ok'},
      {t:`[+] Bash history cleared`,c:'ok'},
      {t:`[*] Clean exit will be possible`,c:'dim'},
      {t:'',c:'blank'},
    ]);
    notify(`Logs deleted: ${n.label}`,'ok');
    checkCleanObjective();
    scrollT();
  },600);
}

function markObjective(id){
  const obj=OBJECTIVES.find(o=>o.id===id);
  if(obj&&!obj.done){
    obj.done=true;
    notify(`OBJECTIVE COMPLETE: ${obj.text.substring(0,40)}...`,'ok');
    rep+=800;
    document.getElementById('tb-rep').querySelector('span').textContent=rep;
    document.getElementById('sb-obj').querySelector('span').textContent=`${OBJECTIVES.filter(o=>o.done).length}/${OBJECTIVES.length}`;
    refreshMission();
  }
}
function checkCleanObjective(){
  const cleaned=Object.keys(logsDeleted).filter(k=>logsDeleted[k]);
  if(cleaned.length>=2)markObjective('clean');
}

function startTrace(){
  traceActive=true; traceLevel=0;
  document.getElementById('trace-ind').style.display='block';
  updateTraceUI();
  traceTimer=setInterval(()=>{
    traceLevel=Math.min(100,traceLevel+traceRate);
    updateTraceUI();
    checkSecOnTraceHigh();
    if(traceLevel>=100){stopTrace();onTraceComplete();}
  },300);
}
function stopTrace(){
  traceActive=false; clearInterval(traceTimer); traceTimer=null;
  document.getElementById('trace-ind').style.display='none';
  document.getElementById('sb-trace').querySelector('span').textContent='—';
  document.getElementById('sb-trace').className='sbi';
}
function updateTraceUI(){
  const p=Math.floor(traceLevel);
  const fill=document.getElementById('tr-f');
  const pct=document.getElementById('tr-pct');
  const sb=document.getElementById('sb-trace');
  fill.style.width=p+'%';
  pct.textContent=p+'%';
  sb.querySelector('span').textContent=p+'%';
  if(p<40){fill.style.background='var(--green)';sb.className='sbi ok';}
  else if(p<70){fill.style.background='var(--amber)';sb.className='sbi warn';}
  else{fill.style.background='var(--red)';sb.className='sbi danger';}
}
function onTraceComplete(){
  const old=connectedNode;
  disconnect();
  plines([
    {t:'',c:'blank'},
    {t:'████████████████████████████████████████',c:'err'},
    {t:'█                                      █',c:'err'},
    {t:'█   TRACE COMPLETE — SESSION BURNED    █',c:'err'},
    {t:'█   Your activity was logged           █',c:'err'},
    {t:'████████████████████████████████████████',c:'err'},
    {t:'',c:'blank'},
    {t:'[!] Return and cover your tracks next time.',c:'warn'},
    {t:'',c:'blank'},
  ]);
}

// ══════════════════════════════════════════════
// NET//MAP
// ══════════════════════════════════════════════
const NODE_POS={
  'GATEWAY':  {x:280,y:60},
  'WEB-SRV':  {x:120,y:200},
  'MAIL-SRV': {x:280,y:200},
  'DB-SRV':   {x:440,y:200},
  'EXEC-TERM':{x:440,y:340},
};

function buildNetmap(body){
  body.innerHTML=`<div class="netmap-wrap"><svg id="netmap-svg" viewBox="0 0 560 420" xmlns="http://www.w3.org/2000/svg"></svg></div>`;
  renderNetmap();
}

function renderNetmap(){
  const svg=document.getElementById('netmap-svg'); if(!svg)return;
  svg.innerHTML='';

  // Draw connections
  const drawn=new Set();
  Object.entries(NETWORK).forEach(([id,n])=>{
    n.links.forEach(lid=>{
      const key=[id,lid].sort().join('--');
      if(drawn.has(key))return; drawn.add(key);
      const a=NODE_POS[id],b=NODE_POS[lid]; if(!a||!b)return;
      const isActive=connectedNode===id||connectedNode===lid;
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',a.x); line.setAttribute('y1',a.y+18);
      line.setAttribute('x2',b.x); line.setAttribute('y2',b.y+18);
      line.setAttribute('class',`conn-line ${isActive?'active':''}`);
      svg.appendChild(line);
    });
  });

  // Draw nodes
  Object.entries(NETWORK).forEach(([id,n])=>{
    const pos=NODE_POS[id]; if(!pos)return;
    const isConn=connectedNode===id;
    const isFW=n.firewall&&!firewallUnlocked[id];
    const isUnlocked=!n.firewall||firewallUnlocked[id];
    const tierCol={public:'#0077a8',internal:'#9e6a03',exec:'#da3633'}[n.tier]||'#30363d';
    const borderCol=isConn?'#00b4d8':isFW?'#da3633':isUnlocked?'#238636':'#30363d';
    const bgCol=isConn?'rgba(0,180,216,0.15)':isFW?'rgba(218,54,51,0.1)':'rgba(28,35,51,0.9)';

    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','node-group');
    g.setAttribute('transform',`translate(${pos.x-48},${pos.y})`);
    g.onclick=()=>onNodeClick(id);

    // BG rect
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('class','node-rect');
    rect.setAttribute('width','96'); rect.setAttribute('height','52');
    rect.setAttribute('rx','2');
    rect.setAttribute('fill',bgCol);
    rect.setAttribute('stroke',borderCol);
    rect.setAttribute('stroke-width','1');
    g.appendChild(rect);

    // Tier stripe
    const stripe=document.createElementNS('http://www.w3.org/2000/svg','rect');
    stripe.setAttribute('width','96'); stripe.setAttribute('height','3');
    stripe.setAttribute('fill',tierCol); stripe.setAttribute('rx','2');
    g.appendChild(stripe);

    // Label
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x','48'); lbl.setAttribute('y','20');
    lbl.setAttribute('class','node-label');
    lbl.setAttribute('fill',isConn?'#00b4d8':'#8b949e');
    lbl.setAttribute('font-weight',isConn?'700':'400');
    lbl.textContent=n.label;
    g.appendChild(lbl);

    // IP
    const ip=document.createElementNS('http://www.w3.org/2000/svg','text');
    ip.setAttribute('x','48'); ip.setAttribute('y','32');
    ip.setAttribute('class','node-sublabel');
    ip.setAttribute('fill','#484f58');
    ip.textContent=n.ip;
    g.appendChild(ip);

    // Status badge — M3 shows security state
    const badge=document.createElementNS('http://www.w3.org/2000/svg','text');
    badge.setAttribute('x','48'); badge.setAttribute('y','46');
    badge.setAttribute('class','node-status');
    const secState=getSecState(id);
    const st=isConn
      ? {t:`● ${secState}`,f:{NOMINAL:'#00b4d8',SUSPICIOUS:'#d29922',INCIDENT:'#f85149',LOCKDOWN:'#a371f7'}[secState]}
      : isFW
      ? {t:'⊘ FIREWALL',f:'#f85149'}
      : patchedExploits[id]
      ? {t:'⊗ PATCHED',f:'#f85149'}
      : {t:`○ ${secState}`,f:{NOMINAL:'#3fb950',SUSPICIOUS:'#d29922',INCIDENT:'#f85149',LOCKDOWN:'#a371f7'}[secState]};
    badge.setAttribute('fill',st.f);
    badge.textContent=st.t;
    g.appendChild(badge);

    svg.appendChild(g);
  });

  // Legend
  const lg=document.createElementNS('http://www.w3.org/2000/svg','g');
  lg.setAttribute('transform','translate(10,380)');
  [{t:'PUBLIC',c:'#0077a8'},{t:'INTERNAL',c:'#9e6a03'},{t:'EXEC',c:'#da3633'}].forEach(({t,c},i)=>{
    const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x',String(i*90)); r.setAttribute('y','0');
    r.setAttribute('width','8'); r.setAttribute('height','8');
    r.setAttribute('fill',c);
    const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
    tx.setAttribute('x',String(i*90+11)); tx.setAttribute('y','8');
    tx.setAttribute('font-family','JetBrains Mono,monospace');
    tx.setAttribute('font-size','7');
    tx.setAttribute('fill','#484f58');
    tx.textContent=t;
    lg.appendChild(r); lg.appendChild(tx);
  });
  svg.appendChild(lg);
}

function onNodeClick(id){
  openApp('terminal');
  focusWin('terminal');
  const n=NETWORK[id];
  if(connectedNode===id){
    pline(`Already connected to ${n.label}`,'warn');
  } else if(connectedNode){
    pline(`[NET//MAP] ${n.label} — disconnect first`,'warn');
  } else {
    pline(`[NET//MAP] Selected: ${n.label} (${n.ip})  |  Type: connect ${id}`,'info');
  }
}

function refreshNetmap(){
  if(WINS['netmap']&&!WINS['netmap'].minimized)renderNetmap();
}

<div class="sm-row"><span class="sm-k">PROXY</span><span class="sm-v warn">NONE</span></div></div>
<hr class="smdiv">
<div><div class="sm-stitle">TRACE</div>
<div class="sm-row"><span class="sm-k">LEVEL</span><span class="sm-v ${traceLevel>70?'danger':traceLevel>40?'warn':'ok'}">${traceLevel.toFixed(1)}%</span></div>
<div class="sm-row"><span class="sm-k">ACTIVE</span><span class="sm-v ${traceActive?'danger':'ok'}">${traceActive?'YES':'no'}</span></div>
<div class="sm-row"><span class="sm-k">RISK</span><span class="sm-v ${traceLevel>70?'danger':traceLevel>40?'warn':'ok'}">${traceLevel>70?'CRITICAL':traceLevel>40?'ELEVATED':'LOW'}</span></div></div>
<hr class="smdiv">
<div><div class="sm-stitle">SECURITY</div>
<div class="sm-row"><span class="sm-k">ALERTS</span><span class="sm-v ${adminAlerts.length?'warn':''}">${adminAlerts.length}</span></div>
<div class="sm-row"><span class="sm-k">ESCALATED</span><span class="sm-v ${Object.values(nodeSecState).filter(s=>s!=='NOMINAL').length?'warn':''}">${Object.values(nodeSecState).filter(s=>s!=='NOMINAL').length}/5 nodes</span></div>
<div class="sm-row"><span class="sm-k">PATCHED</span><span class="sm-v ${Object.keys(patchedExploits).length?'danger':''}">${Object.keys(patchedExploits).length} exploit(s)</span></div></div>
<hr class="smdiv">
<div><div class="sm-stitle">MISSION</div>
<div class="sm-row"><span class="sm-k">OBJECTIVES</span><span class="sm-v ok">${OBJECTIVES.filter(o=>o.done).length}/${OBJECTIVES.length}</span></div>
<div class="sm-row"><span class="sm-k">EXFIL</span><span class="sm-v">${exfilVault.length} file(s)</span></div></div>`;
}

// ══════════════════════════════════════════════
// NOTIFICATION
// ══════════════════════════════════════════════
let notifTimeout=null;
function notify(msg,type='info'){
  const el=document.getElementById('notif');
  document.getElementById('notif-txt').textContent=msg;
  el.className=type; el.style.display='block';
  if(notifTimeout)clearTimeout(notifTimeout);
  notifTimeout=setTimeout(()=>{el.style.display='none';},3500);
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function resolveNode(arg){
  if(!arg)return null;
  const a=arg.toUpperCase();
  // Direct ID match
  if(NETWORK[a])return a;
  // IP match
  const byIP=Object.entries(NETWORK).find(([,n])=>n.ip===arg);
  if(byIP)return byIP[0];
  // Partial label match
  const byLabel=Object.entries(NETWORK).find(([id,n])=>
    id.toLowerCase().includes(arg.toLowerCase())||
    n.label.toLowerCase().includes(arg.toLowerCase())
  );
  return byLabel?byLabel[0]:null;
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
window.onload=()=>runBoot();
</script>
